# Development overrides: hot reload, localhost-only ports, debug logging
services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  api:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/api.Dockerfile
    volumes:
      - ../../backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      LOG_LEVEL: DEBUG

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
      target: deps
    command: npm run dev
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "127.0.0.1:3000:3000"
